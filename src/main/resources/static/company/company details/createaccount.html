<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>

:root{
--primary-purple:#9c27b0;
}

body{
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:flex-start;
height:100vh;
background:#f5f5f5;
}

.edit-profile-container{
max-width:400px;
width:100%;
background:white;
padding:20px;
border-radius:8px;
}

h2{
text-align:center;
margin-bottom:20px;
}

/* Tabs */

.tabs{
display:flex;
justify-content:center;
border-bottom:1px solid #ddd;
margin-bottom:20px;
}

.tab-btn{
flex:1;
padding:12px;
border:none;
background:none;
cursor:pointer;
font-size:16px;
color:#888;
position:relative;
}

.tab-btn.active{
color:black;
font-weight:bold;
}

.tab-btn.active::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:3px;
background:#d93025;
}

/* Inputs */

.input-group{
margin-bottom:18px;
border-bottom:1px solid #ccc;
}

.input-group label{
font-size:12px;
color:#888;
display:block;
}

.input-group input,
.input-group select{
width:100%;
border:none;
outline:none;
padding:8px 0;
}

/* Button */

.save-btn{
width:100%;
background:var(--primary-purple);
color:white;
border:none;
padding:14px;
border-radius:4px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

/* Settings */

.settings-container{
padding-top:10px;
}

.settings-option{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.option-text span{
display:block;
font-size:12px;
color:#666;
}

.divider{
border:0;
border-top:1px solid #eee;
margin:20px 0;
}

.danger-zone{
border:1px solid #ffccd2;
padding:15px;
border-radius:8px;
background:#fff8f8;
}

.danger-zone h4{
color:#d93025;
margin-top:0;
}

.delete-btn{
width:100%;
background:#d93025;
color:white;
border:none;
padding:12px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div class="edit-profile-container">

<h2>Create Account</h2>

<!-- Tabs -->
<nav class="tabs">

<button class="tab-btn active" onclick="openTab(event,'Primary')">
Primary
</button>

<button class="tab-btn" onclick="openTab(event,'Settings')">
Settings
</button>

</nav>

<!-- PRIMARY TAB -->

<div id="Primary" class="tab-content">

<form id="profileForm">

<div class="input-group">
<label>Full Name *</label>
<input type="text" required>
</div>

<div class="input-group">
<label>Phone Number *</label>
<input type="tel" required>
</div>

<div class="input-group">
<label>Address *</label>
<input type="text" required>
</div>

<div class="input-group">
<label>Gender *</label>
<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="input-group">
<label>Pincode *</label>
<input type="text" required>
</div>

<div class="input-group">
<label>City *</label>
<input type="text" required>
</div>

<div class="input-group">
<label>State *</label>
<input type="text" required>
</div>

<div class="input-group">
<label>Language Spoken *</label>
<input type="text" required>
</div>

<button type="submit" class="save-btn">
Save
</button>

</form>

</div>


<!-- SETTINGS TAB -->

<div id="Settings" class="tab-content" style="display:none">

<div class="settings-container">

<h3>Account Settings</h3>

<div class="settings-option">

<div class="option-text">
<label>Push Notifications</label>
<span>Receive alerts about your profile activity</span>
</div>

<input type="checkbox" checked>

</div>

<hr class="divider">

<div class="danger-zone">

<h4>Danger Zone</h4>

<p>Once you delete your account, there is no going back.</p>

<button class="delete-btn" onclick="confirmDelete()">
DELETE ACCOUNT
</button>

</div>

</div>

</div>

</div>


<script>

function openTab(evt, tabName){

var tabContent=document.getElementsByClassName("tab-content");

for(var i=0;i<tabContent.length;i++){
tabContent[i].style.display="none";
}

var tabLinks=document.getElementsByClassName("tab-btn");

for(var i=0;i<tabLinks.length;i++){
tabLinks[i].className=tabLinks[i].className.replace(" active","");
}

document.getElementById(tabName).style.display="block";

evt.currentTarget.className+=" active";

}

function confirmDelete(){

let text="Are you sure you want to delete your account?";

if(confirm(text)==true){

alert("Account Deleted");

}

}

</script>

<script src="card.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add to Cart</title>
    <link rel="stylesheet" href="stylesheet/style.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="logo.png" alt="logo" class="logo-image">
            <span class="logo-text">MRM Handmade Craft</span>
        </div>
        <div class="nav-container">
            <div class="nav-item"><a href="company.html" class="line">Home</a></div>
            <div class="nav-item"><a href="prod.html" class="line">Product</a></div>
            <div class="nav-item"><a href="Add to card.html" class="line">Add to card</a></div>
            <div class="nav-item"><a href="About  us.html" class="line">About us</a></div>
        </div>
    </div>

    <div class="cart-page" style="margin-top: 120px; margin-bottom: 80px;">
        <h1 style="text-align: center; margin-bottom: 40px;">Your Shopping Cart</h1>
        
        <div class="cart-display">
            <div id="empty-cart" style="text-align: center; padding: 40px; font-size: 18px; color: #666; display: block;">
                Your cart is empty. <a href="prod.html" style="color: #4CAF50; text-decoration: none;">Continue Shopping</a>
            </div>
            <ul id="cart-items" style="list-style: none; padding: 0; margin: 0;"></ul>
        </div>

        <div class="cart-summary">
            <div id="total-price" style="font-size: 24px; font-weight: bold; margin: 20px 0; text-align: center;">Total: Rs. 0</div>
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <a href="prod.html" class="btn-continue">Continue Shopping</a>
                <button id="checkout-btn" class="btn-checkout">Proceed to Checkout</button>
                <button id="clear-cart-btn" class="btn-clear">Clear Cart</button>
            </div>
        </div>
    </div>

 
 

    <script src="card.js"></script>
</body>
</html>
